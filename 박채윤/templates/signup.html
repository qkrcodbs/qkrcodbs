<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-80">

        <h2 class="text-2xl font-bold text-center mb-6">회원가입</h2>

        <form method="POST" action="/signup" class="space-y-4">

            <input type="text" name="username" placeholder="아이디" class="w-full px-4 py-2 border rounded-lg">

            <input type="password" name="password" placeholder="비밀번호" class="w-full px-4 py-2 border rounded-lg">

            <button type="submit" class="w-full bg-green-500 text-white py-2 rounded-lg">
                가입하기
            </button>

        </form>

        {% if error %}
        <p class="text-red-500 text-sm mt-3">
            {{ error }}
        </p>
        {% endif %}

        <div class="text-center mt-4 text-sm">
            <a href="/login" class="text-blue-500">로그인으로</a>
        </div>

    </div>

</body>

</html>
